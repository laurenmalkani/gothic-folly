<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gothic Folly Rose Window — Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #ccc; font-family: monospace;
          display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #toolbar {
    display: flex; gap: 12px; align-items: center; padding: 8px 14px;
    background: #111; border-bottom: 1px solid #333; flex-shrink: 0; flex-wrap: wrap;
  }
  #toolbar h1 { font-size: 13px; color: #888; margin-right: 6px; }
  button {
    font-family: monospace; font-size: 12px; padding: 4px 10px;
    background: #222; color: #aaa; border: 1px solid #444; border-radius: 3px; cursor: pointer;
  }
  button.active, button:hover { background: #333; color: #fff; border-color: #888; }
  button.active { border-color: #f90; color: #f90; }
  select { font-family: monospace; font-size: 12px; padding: 4px 8px;
            background: #222; color: #aaa; border: 1px solid #444; border-radius: 3px; }
  label { font-size: 12px; color: #888; }
  input[type=range] { width: 80px; accent-color: #f90; }
  #live-badge {
    font-size: 12px; font-weight: bold; padding: 3px 8px;
    border-radius: 3px; display: none;
    background: #0a2a0a; color: #4f4; border: 1px solid #4f4;
  }
  #live-badge.active { display: inline; }
  #info { margin-left: auto; font-size: 11px; color: #555; }
  #canvas-wrap { flex: 1; overflow: hidden; position: relative; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="toolbar">
  <select onchange="location.href=this.value" style="font-family:monospace;font-size:13px;font-weight:bold;padding:4px 8px;background:#1a1a1a;color:#aaa;border:1px solid #444;border-radius:3px;">
    <option value="rose-window-sim.html" selected>🕸 ROSE WINDOW</option>
    <option value="cathedral-3d-sim.html">🏰 3D LAYOUT</option>
  </select>

  <label>EFFECT</label>
  <select id="sel-effect" onchange="setEffect(this.value)">
    <optgroup label="── animated ──">
      <option value="wave" selected>radial wave</option>
      <option value="spin">spin sweep</option>
      <option value="pulse">pulse</option>
      <option value="static">static (cell colors)</option>
      <option value="all-white">all white</option>
      <option value="all-off">all off</option>
    </optgroup>
    <optgroup label="── grid 48×7 ──">
      <option value="grid-h">h-sweep (around circle)</option>
      <option value="grid-v">v-sweep (rim → hub)</option>
      <option value="grid-diag">diagonal</option>
      <option value="grid-checker">a|b|c checker</option>
    </optgroup>
  </select>

  <label>SPEED</label>
  <input type="range" id="sl-speed" min="0.1" max="3" step="0.1" value="1">

  <span id="live-badge" title="Receiving live data from relay">● LIVE</span>
  <span id="info">loading…</span>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
</div>

,53.8]]},{"cell":"4a","area_mm2":83263,"centroid":{"r":1405.0,"t":-123.7},"ring":[[1282.7,-34.6],[1340.0,-23.0],[1402.4,-17.9],[1469.9,-19.3],[1523.9,-24.6],[1568.0,-47.0],[1592.4,-61.6],[1612.9,-76.1],[1629.4,-90.2],[1641.9,-104.2],[1650.5,-117.9],[1655.1,-131.3],[1654.5,-151.1],[1649.1,-164.0],[1639.8,-176.6],[1618.4,-195.2],[1588.1,-213.2],[1533.7,-236.4],[1433.2,-221.5],[1326.7,-203.3],[1214.1,-181.8],[1095.6,-156.9],[1112.8,-136.4],[1131.4,-117.6],[1151.2,-100.3],[1172.2,-84.7],[1206.2,-64.4],[1230.4,-52.8]]},{"cell":"3b","area_mm2":24913,"centroid":{"r":1089.9,"t":-0.9},"ring":[[970.4,-1.0],[1061.0,85.2],[1069.4,90.8],[1080.6,93.5],[1089.2,92.0],[1097.9,87.5],[1130.5,56.6],[1162.8,34.0],[1200.7,14.8],[1244.2,-0.8],[1200.8,-16.5],[1162.9,-35.7],[1130.6,-58.4],[1098.0,-89.3],[1089.4,-93.9],[1080.8,-95.4],[1072.3,-93.9],[1061.2,-87.1]]},{"cell":"2a","area_mm2":32191,"centroid":{"r":835.8,"t":-65.1},"ring":[[569.8,-17.0],[932.9,-17.0],[974.9,-48.9],[1009.3,-80.8],[1026.8,-108.4],[1032.3,-122.9],[1033.1,-133.3],[1030.1,-137.5],[1024.3,-140.0],[1015.7,-140.8],[999.9,-139.3],[827.9,-104.4],[690.2,-78.7],[667.0,-71.4],[647.0,-62.6]]},{"cell":"2c","area_mm2":32182,"centroid":{"r":835.6,"t":62.8},"ring":[[932.9,14.8],[569.8,14.2],[646.9,59.9],[666.8,68.8],[690.0,76.2],[827.7,102.1],[999.6,137.3],[1021.5,138.4],[1029.9,135.5],[1032.9,131.3],[1032.1,120.9],[1026.7,106.4],[1009.2,78.8],[985.7,55.9]]},{"cell":"1b","area_mm2":5404,"centroid":{"r":505.4,"t":-1.4},"ring":[[454.3,-1.5],[456.4,8.8],[461.9,16.8],[484.3,29.0],[522.4,40.3],[569.8,46.6],[542.2,26.7],[514.9,-1.4],[542.2,-29.6],[569.9,-49.4],[522.5,-43.2],[484.4,-31.9],[461.9,-19.8],[456.4,-11.7]]}]};

// ── Constants ──────────────────────────────────────────────────────────────
const CELL_COLORS = {
  '7a': '#e74c3c', '7b': '#e67e22', '7c': '#f1c40f',
  '6a': '#2ecc71', '6c': '#1abc9c',
  '5a': '#3498db', '5b': '#9b59b6', '5c': '#34495e',
  '4a': '#e91e63', '4c': '#ff5722',
  '3b': '#00bcd4',
  '2a': '#8bc34a', '2c': '#cddc39',
  '1b': '#ffffff',
  '': '#444444',
};

const GRID_COLS = 48;
const GRID_ROWS = 7;
const GRID_MAP = {
  '7a':[0,0], '7b':[1,0], '7c':[2,0],
  '6a':[0,1],             '6c':[2,1],
  '5a':[0,2], '5b':[1,2], '5c':[2,2],
  '4a':[0,3],             '4c':[2,3],
              '3b':[1,4],
  '2a':[0,5],             '2c':[2,5],
              '1b':[1,6],
};

function getGridPos(cell, petal) {
  const e = GRID_MAP[cell];
  if (!e) return null;
  return { col: petal * 3 + e[0], row: e[1] };
}

// ── Live sACN state (from relay) ───────────────────────────────────────────
const RELAY_URL      = 'ws://localhost:3001';
const LIVE_TIMEOUT_MS = 3000;
let liveColors = {};
let isLive     = false;
let liveTimer  = null;

function setLive(active) {
  isLive = active;
  document.getElementById('live-badge').classList.toggle('active', active);
}

function startRelay() {
  let ws;
  function connect() {
    ws = new WebSocket(RELAY_URL);
    ws.onopen  = () => {};
    ws.onclose = () => { setLive(false); setTimeout(connect, 3000); };
    ws.onerror = () => {};
    ws.onmessage = (evt) => {
      const msg = JSON.parse(evt.data);
      if (msg.type !== 'cells') return;
      for (const { petal, cell, r, g, b } of msg.data)
        liveColors[`${petal}:${cell}`] = { r, g, b };
      if (!isLive) setLive(true);
      clearTimeout(liveTimer);
      liveTimer = setTimeout(() => { liveColors = {}; setLive(false); }, LIVE_TIMEOUT_MS);
    };
  }
  connect();
}

// ── State ──────────────────────────────────────────────────────────────────
const cellPolygons = CELL_DATA.cells;
let effect    = 'wave';
let animPhase = 0;
let lastTs    = null;
let animId    = null;

// ── Canvas ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let scale = 1, offsetX = 0, offsetY = 0;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const avail = Math.min(canvas.width, canvas.height) * 0.92;
  scale   = avail / (2 * 2750);
  offsetX = canvas.width  / 2;
  offsetY = canvas.height / 2;
  draw();
}
window.addEventListener('resize', resize);

function worldToScreen(x, y) {
  return [offsetX + x * scale, offsetY - y * scale];
}

// ── Color helpers ──────────────────────────────────────────────────────────
function hsl(h, s, l) {
  return `hsl(${Math.round(h*360)},${Math.round(s*100)}%,${Math.round(l*100)}%)`;
}
function modulateColor(hex, bright) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const sc = Math.min(1, Math.max(0, bright));
  return `rgb(${Math.round(r*sc)},${Math.round(g*sc)},${Math.round(b*sc)})`;
}

// ── LED color ──────────────────────────────────────────────────────────────
function getCellColor(petal, cell, phase) {
  if (isLive) {
    const live = liveColors[`${petal}:${cell}`];
    return live ? `rgb(${live.r},${live.g},${live.b})` : '#080808';
  }

  if (effect === 'all-off')    return null;
  if (effect === 'all-white')  return '#ffffff';

  // Grid effects
  if (effect.startsWith('grid-')) {
    const gp = getGridPos(cell, petal);
    if (!gp) return '#0a0a0a';
    const cn = gp.col / (GRID_COLS - 1);
    const rn = gp.row / (GRID_ROWS - 1);
    const t  = phase;
    if (effect === 'grid-h') {
      const hue = ((cn - t * 0.7) % 1 + 1) % 1;
      return hsl(hue, 1, Math.max(0.05, 0.3 + 0.35 * Math.sin((cn - t*1.5)*Math.PI*2)));
    }
    if (effect === 'grid-v') {
      const hue = ((rn - t * 0.5) % 1 + 1) % 1;
      return hsl(hue, 1, Math.max(0.05, 0.3 + 0.35 * Math.sin((rn - t*2)*Math.PI*3)));
    }
    if (effect === 'grid-diag') {
      const d = ((cn*0.7 + rn*0.3 - t) % 1 + 1) % 1;
      return hsl(d, 1, Math.max(0.05, 0.3 + 0.35 * Math.sin(d*Math.PI*2)));
    }
    if (effect === 'grid-checker') {
      const isAC = (gp.col % 3 !== 1);
      const lit  = Math.floor(phase * 1.5) % 2 === 0 ? isAC : !isAC;
      return hsl((phase * 0.15) % 1, 1, lit ? 0.45 : 0.04);
    }
  }

  const base = CELL_COLORS[cell] || '#444';
  if (effect === 'static') return base;

  let bright = 1;
  const led = {
    r: 0, ang: 0, petal, led: 0,  // filled in below
  };

  if (effect === 'wave') {
    // use centroid r — approximated via cellPolygons
    const cellDef = cellPolygons.find(c => c.cell === cell);
    const cr = cellDef ? cellDef.centroid.r : 1500;
    bright = 0.5 + 0.5 * Math.sin((cr/2500 - phase*3)*Math.PI*4);
    bright = Math.max(0.05, bright);
  } else if (effect === 'spin') {
    const a = petal / 16;
    bright = 0.5 + 0.5 * Math.sin((a - phase)*Math.PI*2);
    bright = Math.max(0.05, bright);
  } else if (effect === 'pulse') {
    bright = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(phase*Math.PI*2));
  }
  return modulateColor(base, bright);
}

// ── Rotation ───────────────────────────────────────────────────────────────
function rotatePetal(r, t, angleDeg) {
  const a = angleDeg * Math.PI / 180;
  return [r*Math.sin(a) + t*Math.cos(a),
          r*Math.cos(a) - t*Math.sin(a)];
}

// ── Draw ───────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Window circle
  const [cx, cy] = worldToScreen(0, 0);
  ctx.beginPath();
  ctx.arc(cx, cy, 2438*scale, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 16 petals × 14 cells
  for (let k = 0; k < 16; k++) {
    const angleDeg = k * 22.5;
    for (const cellDef of cellPolygons) {
      const color = getCellColor(k, cellDef.cell, animPhase);
      if (!color) continue;

      ctx.beginPath();
      for (let i = 0; i < cellDef.ring.length; i++) {
        const [wx, wy] = rotatePetal(cellDef.ring[i][0], cellDef.ring[i][1], angleDeg);
        const [sx, sy] = worldToScreen(wx, wy);
        if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
      }
      ctx.closePath();
      ctx.shadowColor = color;
      ctx.shadowBlur  = Math.max(4, scale * 60);
      ctx.fillStyle   = color;
      ctx.globalAlpha = 0.82;
      ctx.fill();
    }
  }
  ctx.shadowBlur  = 0;
  ctx.globalAlpha = 1;
}

// ── Effect / animation ─────────────────────────────────────────────────────
function setEffect(e) {
  effect = e;
  if (animId) { cancelAnimationFrame(animId); animId = null; lastTs = null; }
  if (effect !== 'static') startAnim(); else draw();
}

function startAnim() {
  function frame(ts) {
    if (lastTs !== null) {
      const speed = parseFloat(document.getElementById('sl-speed').value);
      animPhase += ((ts - lastTs) / 1000) * speed * 0.3;
    }
    lastTs = ts;
    draw();
    animId = requestAnimationFrame(frame);
  }
  animId = requestAnimationFrame(frame);
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('info').textContent =
  `${cellPolygons.length} cell shapes · 16 petals · 224 cells`;
resize();
startAnim();
startRelay();
</script>
